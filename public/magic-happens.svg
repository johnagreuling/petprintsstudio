<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1d2e"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    
    <!-- Golden glow -->
    <radialGradient id="goldGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Teal accent glow -->
    <radialGradient id="tealGlow" cx="30%" cy="60%" r="25%">
      <stop offset="0%" style="stop-color:#1a7f8e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1a7f8e;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Secondary teal -->
    <radialGradient id="tealGlow2" cx="75%" cy="35%" r="20%">
      <stop offset="0%" style="stop-color:#1a7f8e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1a7f8e;stop-opacity:0"/>
    </radialGradient>

    <!-- Star filter for sparkle -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Ambient glows -->
  <rect width="400" height="400" fill="url(#goldGlow)"/>
  <rect width="400" height="400" fill="url(#tealGlow)"/>
  <rect width="400" height="400" fill="url(#tealGlow2)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#C9A84C" stroke-width="0.5" fill="none">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>
  
  <!-- Music Notes - scattered -->
  <g fill="#C9A84C" filter="url(#glow)">
    <!-- Large note top left -->
    <g transform="translate(85, 95)" opacity="0.7">
      <ellipse cx="0" cy="0" rx="12" ry="9" transform="rotate(-20)"/>
      <rect x="10" y="-45" width="3" height="45"/>
      <path d="M13,-45 Q25,-50 13,-35" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
    </g>
    
    <!-- Double note top right -->
    <g transform="translate(305, 85)" opacity="0.6">
      <ellipse cx="0" cy="0" rx="10" ry="7" transform="rotate(-15)"/>
      <ellipse cx="25" cy="-5" rx="10" ry="7" transform="rotate(-15)"/>
      <rect x="8" y="-38" width="2.5" height="38"/>
      <rect x="33" y="-43" width="2.5" height="38"/>
      <rect x="8" y="-40" width="27.5" height="3"/>
    </g>
    
    <!-- Note bottom left -->
    <g transform="translate(70, 295)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="9" ry="7" transform="rotate(-25)"/>
      <rect x="7" y="-32" width="2.5" height="32"/>
      <path d="M9.5,-32 Q18,-36 9.5,-22" fill="none" stroke="#C9A84C" stroke-width="2"/>
    </g>
    
    <!-- Small note right side -->
    <g transform="translate(330, 240)" opacity="0.55">
      <ellipse cx="0" cy="0" rx="8" ry="6" transform="rotate(-20)"/>
      <rect x="6" y="-28" width="2" height="28"/>
    </g>
    
    <!-- Treble clef hint - center area -->
    <g transform="translate(200, 200)" opacity="0.15">
      <path d="M0,-60 C30,-50 25,0 0,20 C-15,32 -20,50 -5,65 C10,78 25,65 25,50 C25,30 5,25 -5,35" 
            fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Sparkles / Stars -->
  <g fill="#C9A84C">
    <!-- 4-point stars -->
    <g transform="translate(140, 130)" opacity="0.8">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"/>
    </g>
    <g transform="translate(280, 160)" opacity="0.6">
      <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z"/>
    </g>
    <g transform="translate(115, 230)" opacity="0.5">
      <path d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1 Z"/>
    </g>
    <g transform="translate(310, 310)" opacity="0.7">
      <path d="M0,-7 L1.5,-1.5 L7,0 L1.5,1.5 L0,7 L-1.5,1.5 L-7,0 L-1.5,-1.5 Z"/>
    </g>
    <g transform="translate(180, 320)" opacity="0.45">
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z"/>
    </g>
    <g transform="translate(250, 100)" opacity="0.55">
      <path d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1 Z"/>
    </g>
    
    <!-- Tiny dots -->
    <circle cx="160" cy="180" r="2" opacity="0.4"/>
    <circle cx="240" cy="280" r="1.5" opacity="0.3"/>
    <circle cx="90" cy="180" r="1.5" opacity="0.35"/>
    <circle cx="320" cy="140" r="2" opacity="0.3"/>
    <circle cx="200" cy="260" r="1" opacity="0.25"/>
  </g>
  
  <!-- Teal accent sparkles -->
  <g fill="#3BA8B8" opacity="0.6">
    <g transform="translate(95, 150)">
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z"/>
    </g>
    <g transform="translate(295, 270)">
      <path d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1 Z"/>
    </g>
    <g transform="translate(175, 85)">
      <path d="M0,-3 L0.7,-0.7 L3,0 L0.7,0.7 L0,3 L-0.7,0.7 L-3,0 L-0.7,-0.7 Z"/>
    </g>
  </g>
  
  <!-- Central magic wand with glow -->
  <g transform="translate(200, 200)">
    <!-- Wand glow -->
    <ellipse cx="0" cy="0" rx="50" ry="50" fill="url(#goldGlow)" opacity="0.4"/>
    
    <!-- Wand -->
    <g transform="rotate(-45)">
      <rect x="-4" y="-55" width="8" height="70" rx="2" fill="#1a1a2e" stroke="#C9A84C" stroke-width="1.5"/>
      <rect x="-6" y="10" width="12" height="8" rx="1" fill="#C9A84C" opacity="0.9"/>
      <rect x="-5" y="18" width="10" height="3" rx="0.5" fill="#C9A84C" opacity="0.7"/>
      <!-- Wand tip sparkle -->
      <g transform="translate(0, -60)">
        <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#C9A84C" filter="url(#glow)"/>
      </g>
    </g>
  </g>
  
  <!-- Floating orbs -->
  <circle cx="130" cy="280" r="15" fill="#1a7f8e" opacity="0.08"/>
  <circle cx="290" cy="120" r="20" fill="#C9A84C" opacity="0.06"/>
  <circle cx="340" cy="340" r="12" fill="#1a7f8e" opacity="0.06"/>
  
</svg>
